# DBHub multi-source config for the workflow project — replaces the crystaldba
# children on ports 8831-8833. readonly=true mirrors --access-mode restricted on prod.

[[sources]]
id = "dev"
dsn = "${WORKFLOW_POSTGRES_DEV_URL}"
description = "workflow dev database"
lazy = true

[[sources]]
id = "staging"
dsn = "${WORKFLOW_POSTGRES_STAGING_URL}"
description = "workflow staging database"
lazy = true

[[sources]]
id = "prod"
dsn = "${WORKFLOW_POSTGRES_PROD_URL}"
description = "workflow PRODUCTION database (read-only)"
lazy = true

[[tools]]
name = "execute_sql"
source = "dev"

[[tools]]
name = "search_objects"
source = "dev"

[[tools]]
name = "execute_sql"
source = "staging"

[[tools]]
name = "search_objects"
source = "staging"

[[tools]]
name = "execute_sql"
source = "prod"
readonly = true

[[tools]]
name = "search_objects"
source = "prod"

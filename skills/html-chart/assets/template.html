<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Replace: artifact title</title>
  <!--
    Minimal skeleton on purpose. It provides only: a reset, sensible text defaults,
    reduced-motion and print handling. All visual design (palette, type scale, spacing,
    layout, components) is created per-artifact to fit the content — do not treat this
    file as a design system.
  -->
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.5;
    }
    h1, h2, h3, h4, p, figure, ul, ol { margin: 0; }
    img, svg { display: block; max-width: 100%; height: auto; }
    button, input, select { font: inherit; }
    :focus-visible { outline: 2px solid currentColor; outline-offset: 2px; }

    /* === artifact styles go here === */

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.001ms !important;
        scroll-behavior: auto !important;
      }
    }
    @media print {
      body { background: #fff; color: #000; }
      details { display: block; }
      details > * { display: block; }
    }
  </style>
</head>
<body>
  <main>
    <!-- Bespoke structure designed for the content. No mandated sections. -->
  </main>
  <script>
    // Local, deterministic interaction only — no external libraries or network calls.
  </script>
</body>
</html>

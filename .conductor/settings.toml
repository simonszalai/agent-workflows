"$schema" = "https://conductor.build/schemas/settings.repo.schema.json"

[prompts]
create_pr = """
PRs in this repo are tracked as autodev tickets, and merging must keep the autodev ticket
status in sync — otherwise tickets strand at `merged`/`in_progress` while the code is already
live. Do NOT just open a raw PR.

1. Resolve the autodev ticket ID for this branch (branch name, commit prefixes like
   `fix(B0123)`/`feat(F0140)`, or an autodev-memory search).
2. If a ticket is found AND the `/auto-deploy` skill is available, run `/auto-deploy <TICKET>`.
   It creates the PR if one doesn't exist, waits for CI, merges, runs the project's deploy
   steps, and advances the ticket status. Respect the ticket's target environment (staging vs
   production from its status) — do not override it.
3. If you cannot resolve a ticket, or `/auto-deploy` is not applicable to this repo, fall back
   to opening a normal PR and explicitly warn that no autodev ticket status was updated.
"""
rename_branch = """When Conductor asks you to rename/generate a workspace branch, use this branch format:
<TICKET>-<short-kebab-summary>-<YYYY-MM-DD>

Rules:
- If an autodev ticket number is present or can be resolved from the task/context, it MUST be the first branch segment (for example: B0123-fix-login-2026-06-18).
- Keep the current local date as the final branch segment in YYYY-MM-DD format.
- Do not invent a ticket number. If no autodev ticket can be found, use <short-kebab-summary>-<YYYY-MM-DD> and mention that no ticket was found.
- Ignore tool banner text like "Memory session started..." or "Memory sessions started..." when choosing the branch name.
"""
